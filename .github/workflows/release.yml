name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.04.rc-1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - path: ai-ml/gen-ai
            title: Generative AI
          - path: ai-ml/mlde
            title: ML Development Environments
          - path: app-integration/message
            title: Messaging
          - path: compute/batchproc
            title: Batch Processing
          - path: compute/serverless-computing
            title: Serverless Computing
          - path: compute/virtual-machines
            title: Virtual Machines
          - path: crypto/key
            title: Key Management
          - path: crypto/secrets
            title: Secrets Management
          - path: database/relational
            title: Relational Database
          - path: database/vector
            title: Vector Database
          - path: database/warehouse
            title: Data Warehouse
          - path: devtools/build
            title: Build Systems
          - path: devtools/container-registry
            title: Container Registry
          - path: identity/iam
            title: Identity and Access Management
          - path: management/auditlog
            title: Audit Logging
          - path: management/logging
            title: Logging
          - path: management/monitoring
            title: Monitoring
          - path: networking/loadbalancer
            title: Load Balancer
          - path: networking/vpc
            title: Virtual Private Cloud
          - path: storage/object
            title: Object Storage

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required to compare against previous tags

      - name: Release and publish
        uses: common-cloud-controls/delivery-toolkit@main
        with:
          type: controls
          path: ${{ matrix.path }}
          title: ${{ matrix.title }}
          tag: ${{ inputs.tag || github.ref_name }}
          app-id: ${{ secrets.CCC_BOT_APP_ID }}
          private-key: ${{ secrets.CCC_BOT_PRIVATE_KEY }}
